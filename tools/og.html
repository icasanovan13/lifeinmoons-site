<!doctype html>
<!-- Social preview card generator. Screenshot at exactly 1200x630:
     chrome --headless=new --window-size=1200,717 --screenshot=assets/og.png tools/og.html
     (headless chrome subtracts 87px of chrome from the window height) -->
<html>
<head><meta charset="utf-8"><style>
  body { margin: 0; background: #0A0E19; }
  canvas { display: block; }
</style></head>
<body>
<canvas id="c" width="1200" height="630"></canvas>
<script src="../js/moonmath.js"></script>
<script>
  const ctx = document.getElementById("c").getContext("2d");
  const CREAM = "#F2E7CE", NIGHT = "#0A0E19";

  ctx.fillStyle = NIGHT;
  ctx.fillRect(0, 0, 1200, 630);

  // faint stars, deterministic
  let seed = 9;
  const rnd = () => (seed = (seed * 16807) % 2147483647) / 2147483647;
  for (let i = 0; i < 90; i++) {
    ctx.fillStyle = "rgba(242,231,206," + (0.04 + rnd() * 0.12).toFixed(3) + ")";
    ctx.beginPath(); ctx.arc(rnd() * 1200, rnd() * 630, rnd() < 0.12 ? 1.3 : 0.7, 0, 7); ctx.fill();
  }

  // left column — the words
  ctx.textBaseline = "top";
  ctx.fillStyle = "rgba(233,224,204,0.55)";
  ctx.font = "500 17px -apple-system, 'Helvetica Neue', sans-serif";
  ctx.letterSpacing = "8px";
  ctx.fillText("LIFE IN MOONS", 84, 130);
  ctx.letterSpacing = "0px";

  ctx.fillStyle = CREAM;
  ctx.font = "500 54px 'New York', Georgia, serif";
  ctx.fillText("You are looking", 80, 190);
  ctx.fillText("at your life.", 80, 258);

  ctx.fillStyle = "rgba(233,224,204,0.6)";
  ctx.font = "26px 'New York', Georgia, serif";
  ctx.fillText("How many moons", 82, 370);
  ctx.fillText("have you lived?", 82, 406);

  // hairline
  ctx.strokeStyle = "rgba(242,231,206,0.2)";
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(82, 480); ctx.lineTo(240, 480); ctx.stroke();
  ctx.fillStyle = "rgba(233,224,204,0.45)";
  ctx.font = "500 13px -apple-system, 'Helvetica Neue', sans-serif";
  ctx.letterSpacing = "5px";
  ctx.fillText("FOR IPHONE", 82, 502);
  ctx.letterSpacing = "0px";

  // right region — a life in moons (the maker's own calendar)
  const img = new Image();
  img.onload = () => {
    const region = { x: 520, y: 40, w: 640, h: 550 };
    const life = MoonMath.build(new Date(2003, 3, 9), 80, new Date(2026, 6, 11));
    const lay = MoonMath.layoutMoons(region.w, region.h, life.count, life.current, 1);
    const rr = lay.dot / 2;
    ctx.save();
    ctx.translate(region.x, region.y);
    for (const m of lay.moons) {
      if (m.state === "past") {
        ctx.globalAlpha = 0.82;
        ctx.drawImage(img, m.x - rr, m.y - rr, lay.dot, lay.dot);
      } else if (m.state === "current") {
        ctx.globalAlpha = 1;
        ctx.drawImage(img, m.x - rr, m.y - rr, lay.dot, lay.dot);
        ctx.strokeStyle = "rgba(242,231,206,0.5)";
        ctx.beginPath(); ctx.arc(m.x, m.y, rr + 4, 0, 7); ctx.stroke();
      } else {
        ctx.globalAlpha = 0.18;
        ctx.strokeStyle = CREAM;
        ctx.lineWidth = 0.7;
        ctx.beginPath(); ctx.arc(m.x, m.y, rr, 0, 7); ctx.stroke();
      }
    }
    ctx.restore();
    document.title = "OG_READY";
  };
  img.src = "../assets/moonsmall.png";
</script>
</body>
</html>
